<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Study Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1f3c;
    --navy2: #1a3358;
    --blue: #2563eb;
    --blue-light: #eff4ff;
    --blue-mid: #dbeafe;
    --green: #166534;
    --green-bg: #dcfce7;
    --red: #9b1c1c;
    --red-bg: #fee2e2;
    --amber: #78350f;
    --amber-bg: #fef3c7;
    --border: #e5e7eb;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,.06), 0 6px 20px rgba(0,0,0,.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* â”€â”€ HEADER â”€â”€ */
  .site-header {
    background: var(--navy);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .site-header h1 {
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .4px;
    flex: 1;
    text-transform: uppercase;
    opacity: .95;
  }
  .header-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    margin-right: 4px;
  }
  .exam-selector select {
    padding: 6px 12px;
    font-size: 13.5px;
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 500;
    border: 1.5px solid rgba(255,255,255,.2);
    border-radius: 6px;
    cursor: pointer;
    background: rgba(255,255,255,.08);
    color: #ffffff;
    outline: none;
    transition: border-color .2s;
  }
  .exam-selector select:hover,
  .exam-selector select:focus { border-color: rgba(255,255,255,.5); }
  .exam-selector select option { background: #1a3358; color: #fff; }
  .timer-pill {
    background: rgba(255,255,255,.1);
    border: 1.5px solid rgba(255,255,255,.18);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #ffffff;
    letter-spacing: 1px;
    min-width: 78px;
    text-align: center;
  }
  .timer-pill.warning {
    background: #dc2626;
    border-color: #dc2626;
    animation: blink .7s infinite alternate;
  }
  @keyframes blink { from {opacity:1} to {opacity:.55} }

  /* â”€â”€ PROGRESS â”€â”€ */
  .progress-wrap {
    height: 3px;
    background: #cbd5e1;
    position: sticky;
    top: 60px;
    z-index: 99;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563eb 0%, #60a5fa 100%);
    transition: width .35s ease;
  }

  /* â”€â”€ PAGE â”€â”€ */
  .page-body {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 72px;
  }
  .exam-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--border);
  }

  /* â”€â”€ SECTION CARD â”€â”€ */
  .section {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .section-head {
    background: var(--navy);
    padding: 13px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.1);
    padding: 2px 8px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .section-head h2 {
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .2px;
  }
  .section-body { padding: 18px 20px 20px; }

  .instructions {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 14px;
  }

  /* â”€â”€ HINT â”€â”€ */
  .hint-toggle {
    display: inline-block;
    background: none;
    border: 1.5px solid #cbd5e1;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    transition: border-color .15s, color .15s;
    letter-spacing: .2px;
  }
  .hint-toggle:hover { border-color: var(--blue); color: var(--blue); }
  .hint-box {
    background: var(--amber-bg);
    border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    padding: 9px 14px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--amber);
    margin-bottom: 12px;
    display: none;
  }

  /* â”€â”€ QUESTIONS â”€â”€ */
  .question {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
  }
  .question:last-child { border-bottom: none; }
  .question > label:first-child {
    flex: 1 1 240px;
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
  }
  .question input[type="text"] {
    flex: 0 0 190px;
    padding: 7px 11px;
    font-size: 14px;
    font-family: 'Inter', Arial, sans-serif;
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  .question input[type="text"]:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }
  .question input[type="text"]:disabled { background: #f9fafb; }

  /* multiple choice */
  .mc-options { display: flex; flex-wrap: wrap; gap: 7px; flex: 100%; padding: 3px 0; }
  .mc-options label {
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 16px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .mc-options label:hover { border-color: var(--blue); background: var(--blue-light); }
  .mc-options input[type="radio"] { display: none; }
  .mc-options label:has(input:checked) { border-color: var(--blue); background: var(--blue-mid); color: var(--navy); }

  /* dropdown */
  .question select {
    padding: 7px 11px;
    font-size: 14px;
    font-family: 'Inter', Arial, sans-serif;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: white;
    color: var(--text);
    outline: none;
    transition: border-color .18s;
  }
  .question select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

  /* writing */
  .question.writing-wrap { display: block; }
  .writing-area {
    width: 100%;
    min-height: 148px;
    font-size: 14px;
    font-family: 'Inter', Arial, sans-serif;
    line-height: 1.75;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    resize: vertical;
    outline: none;
    color: var(--text);
    transition: border-color .18s, box-shadow .18s;
  }
  .writing-area:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .writing-area:disabled { background: #f9fafb; }
  .word-count { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .word-count.ok { color: var(--green); font-weight: 600; }

  /* feedback */
  .feedback {
    font-size: 12.5px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 5px;
    display: none;
    flex: 100%;
    line-height: 1.5;
  }
  .feedback.correct { background: var(--green-bg); color: var(--green); display: block; }
  .feedback.wrong   { background: var(--red-bg);   color: var(--red);   display: block; }

  /* â”€â”€ BUTTONS â”€â”€ */
  .btn {
    padding: 9px 22px;
    font-size: 13.5px;
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: .2px;
    transition: opacity .15s, transform .1s, box-shadow .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { opacity: .88; box-shadow: 0 4px 14px rgba(37,99,235,.3); }
  .btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: #f1f5f9; }
  .btn-navy { background: var(--navy); color: white; }
  .btn-navy:hover { opacity: .85; }
  .button-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 26px; }

  /* â”€â”€ RESULTS â”€â”€ */
  #results-panel {
    display: none;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 28px;
    margin-top: 20px;
  }
  .results-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .score-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .score-big {
    font-size: 54px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .score-pct {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
  }
  .score-msg {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .grade-badge {
    display: block;
    width: fit-content;
    margin: 0 auto 24px;
    padding: 5px 28px;
    border-radius: 5px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 3px;
  }
  .divider { height: 1px; background: var(--border); margin: 22px 0; }
  .section-scores table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .section-scores thead th {
    text-align: left;
    padding: 9px 14px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--muted);
    background: #f8fafc;
    border-bottom: 1.5px solid var(--border);
  }
  .section-scores td { padding: 10px 14px; border-bottom: 1px solid #f1f4f8; }
  .section-scores tbody tr:last-child td { border-bottom: none; }
  .section-scores tbody tr:hover td { background: #fafbfd; }
  .pct-cell { font-weight: 700; font-variant-numeric: tabular-nums; }

  @media (max-width: 640px) {
    .site-header { padding: 0 14px; }
    .page-body { padding: 20px 10px 56px; }
    .section-head { padding: 11px 14px; }
    .section-body { padding: 14px; }
    .score-big { font-size: 40px; }
  }
</style>
</head>

let currentExam = 0;
let timerInterval = null;
let secondsLeft = 0;
let submitted = false;

function loadExam() {
  currentExam = parseInt(document.getElementById('examSelect').value);
  clearInterval(timerInterval);
  submitted = false;
  document.getElementById('results-panel').style.display = 'none';
  renderExam(currentExam);
  startTimer(EXAMS[currentExam].time);
  updateProgress();
}

function renderExam(idx) {
  const exam = EXAMS[idx];
  let html = '<p class="exam-title">' + exam.title + '</p>';

  exam.sections.forEach(function(section) {
    html += '<div class="section" id="section-' + section.number + '">';
    html += '<div class="section-head">';
    html += '<span class="section-tag">Section ' + section.number + '</span>';
    html += '<h2>' + section.title + '</h2>';
    html += '</div>';
    html += '<div class="section-body">';
    html += '<div class="instructions">' + section.instructions + '</div>';
    html += '<button class="hint-toggle" onclick="toggleHint(' + section.number + ')">Show hint</button>';
    html += '<div class="hint-box" id="hint-' + section.number + '">' + section.hint + '</div>';

    section.questions.forEach(function(q) {
      if (q.type === 'fill') {
        html += '<div class="question" id="wrap-' + q.id + '">';
        html += '<label for="' + q.id + '">' + q.text + '</label>';
        html += '<input type="text" id="' + q.id + '" placeholder="your answer" oninput="updateProgress()">';
        html += '<div class="feedback" id="fb-' + q.id + '"></div>';
        html += '</div>';
      } else if (q.type === 'mc') {
        html += '<div class="question" id="wrap-' + q.id + '">';
        html += '<label>' + q.text + '</label>';
        html += '<div class="mc-options">';
        q.options.forEach(function(o) {
          html += '<label><input type="radio" name="' + q.id + '" value="' + o + '" onchange="updateProgress()"><span>' + o + '</span></label>';
        });
        html += '</div>';
        html += '<div class="feedback" id="fb-' + q.id + '"></div>';
        html += '</div>';
      } else if (q.type === 'dropdown') {
        html += '<div class="question" id="wrap-' + q.id + '">';
        html += '<label for="' + q.id + '">' + q.text + '</label>';
        html += '<select id="' + q.id + '" onchange="updateProgress()"><option value="">-- select --</option>';
        q.options.forEach(function(o) { html += '<option value="' + o + '">' + o + '</option>'; });
        html += '</select>';
        html += '<div class="feedback" id="fb-' + q.id + '"></div>';
        html += '</div>';
      } else if (q.type === 'writing') {
        html += '<div class="question writing-wrap" id="wrap-' + q.id + '">';
        html += '<textarea class="writing-area" id="' + q.id + '" placeholder="Write here..." oninput="updateWordCount(\'' + q.id + '\',' + q.minWords + ')"></textarea>';
        html += '<div class="word-count" id="wc-' + q.id + '">0 / ' + q.minWords + ' words minimum</div>';
        html += '<div class="feedback" id="fb-' + q.id + '"></div>';
        html += '</div>';
      }
    });
    html += '</div>';
    html += '</div>';
  });

  html += '<div class="button-row">';
  html += '<button class="btn btn-primary" onclick="submitExam()">Submit Exam</button>';
  html += '<button class="btn btn-outline" onclick="clearExam()">Clear All</button>';
  html += '</div>';

  document.getElementById('examContainer').innerHTML = html;
}

function toggleHint(n) {
  var box = document.getElementById('hint-' + n);
  var btn = box.previousElementSibling;
  if (box.style.display === 'block') {
    box.style.display = 'none';
    btn.textContent = 'Show hint';
  } else {
    box.style.display = 'block';
    btn.textContent = 'Hide hint';
  }
}

function updateWordCount(id, min) {
  var val = document.getElementById(id).value.trim();
  var count = val === '' ? 0 : val.split(/\s+/).length;
  var el = document.getElementById('wc-' + id);
  el.textContent = count + ' / ' + min + ' words minimum';
  el.className = 'word-count' + (count >= min ? ' ok' : '');
}

function updateProgress() {
  var exam = EXAMS[currentExam];
  var total = 0, answered = 0;
  exam.sections.forEach(function(sec) {
    sec.questions.forEach(function(q) {
      if (q.type === 'writing') return;
      total++;
      var val = getAnswer(q);
      if (val && val !== '') answered++;
    });
  });
  var pct = total === 0 ? 0 : Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function getAnswer(q) {
  if (q.type === 'fill' || q.type === 'dropdown' || q.type === 'writing') {
    var el = document.getElementById(q.id);
    return el ? el.value : '';
  } else if (q.type === 'mc') {
    var sel = document.querySelector('input[name="' + q.id + '"]:checked');
    return sel ? sel.value : '';
  }
  return '';
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/\s+/g, ' ');
}

function isCorrect(q) {
  if (q.type === 'writing') {
    var val = document.getElementById(q.id).value;
    var count = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
    return count >= q.minWords;
  }
  var userAns = normalize(getAnswer(q));
  if (!userAns) return false;
  var validAnswers = q.answer.split('|').map(function(a) { return normalize(a); });
  return validAnswers.indexOf(userAns) !== -1;
}

function submitExam() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  var exam = EXAMS[currentExam];
  var totalScore = 0, totalQuestions = 0;
  var sectionData = [];

  exam.sections.forEach(function(section) {
    var sectionScore = 0, sectionTotal = 0;

    section.questions.forEach(function(q) {
      sectionTotal++;
      var correct = isCorrect(q);
      if (correct) { sectionScore++; totalScore++; }
      totalQuestions++;

      var fb = document.getElementById('fb-' + q.id);
      if (q.type === 'writing') {
        var val = document.getElementById(q.id).value;
        var count = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
        if (correct) {
          fb.className = 'feedback correct';
          fb.textContent = 'Correct â€” ' + count + ' words.';
        } else {
          fb.className = 'feedback wrong';
          fb.textContent = 'Too short: ' + count + ' words written, ' + q.minWords + ' required.';
        }
        document.getElementById(q.id).disabled = true;
      } else {
        var userAns = getAnswer(q);
        if (correct) {
          fb.className = 'feedback correct';
          fb.textContent = 'Correct';
        } else {
          var displayAnswer = q.answer.split('|').join(' or ');
          fb.className = 'feedback wrong';
          fb.textContent = (userAns ? 'Incorrect â€” you wrote "' + userAns + '". ' : 'No answer. ') + 'Correct answer: ' + displayAnswer;
        }
        if (q.type === 'fill') { document.getElementById(q.id).disabled = true; }
        else if (q.type === 'mc') { document.querySelectorAll('input[name="' + q.id + '"]').forEach(function(r){ r.disabled = true; }); }
        else if (q.type === 'dropdown') { document.getElementById(q.id).disabled = true; }
      }
    });

    sectionData.push({ title: section.title, score: sectionScore, total: sectionTotal });
  });

  showResults(totalScore, totalQuestions, sectionData);
}

function showResults(score, total, sections) {
  var pct = Math.round((score / total) * 100);
  var letterGrade, gradeColor;
  if (pct >= 90) { letterGrade = 'A+'; gradeColor = '#1a7a1a'; }
  else if (pct >= 80) { letterGrade = 'A'; gradeColor = '#2e7d32'; }
  else if (pct >= 70) { letterGrade = 'B'; gradeColor = '#1565c0'; }
  else if (pct >= 60) { letterGrade = 'C'; gradeColor = '#e65100'; }
  else { letterGrade = 'F'; gradeColor = '#c0392b'; }

  document.getElementById('scoreBig').textContent = score + ' / ' + total;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreMsg').textContent = getEncouragement(pct);
  document.getElementById('gradeBadgeWrap').innerHTML = '<span class="grade-badge" style="background:' + gradeColor + ';color:white">' + letterGrade + '</span>';

  var tableHTML = '<table><thead><tr><th>Section</th><th>Score</th><th>%</th></tr></thead><tbody>';
  sections.forEach(function(s) {
    var sp = Math.round((s.score / s.total) * 100);
    var color = sp >= 70 ? '#166534' : sp >= 50 ? '#92400e' : '#9b1c1c';
    tableHTML += '<tr><td>' + s.title + '</td><td>' + s.score + ' / ' + s.total + '</td><td class="pct-cell" style="color:' + color + '">' + sp + '%</td></tr>';
  });
  tableHTML += '</tbody></table>';
  document.getElementById('sectionScores').innerHTML = tableHTML;

  var panel = document.getElementById('results-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth' });
}

function getEncouragement(pct) {
  if (pct === 100) return 'Perfect score â€” outstanding performance.';
  if (pct >= 90) return 'Excellent work.';
  if (pct >= 80) return 'Great result, keep it up.';
  if (pct >= 70) return 'Good â€” review the sections below 70%.';
  if (pct >= 60) return 'Passing, but there is room to improve.';
  return 'Keep studying â€” focus on the sections with the lowest scores.';
}

function reviewAnswers() {
  document.getElementById('examContainer').scrollIntoView({ behavior: 'smooth' });
}

function retakeExam() {
  document.getElementById('results-panel').style.display = 'none';
  submitted = false;
  renderExam(currentExam);
  startTimer(EXAMS[currentExam].time);
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextExam() {
  var next = (currentExam + 1) % EXAMS.length;
  document.getElementById('examSelect').value = next;
  loadExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearExam() {
  if (submitted) return;
  renderExam(currentExam);
  updateProgress();
}

function startTimer(minutes) {
  clearInterval(timerInterval);
  secondsLeft = minutes * 60;
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 60) { document.getElementById('timerDisplay').classList.add('warning'); }
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      if (!submitted) { alert('Time is up. Submitting your exam...'); submitExam(); }
    }
  }, 1000);
}

function updateTimerDisplay() {
  var m = Math.floor(secondsLeft / 60);
  var s = secondsLeft % 60;
  document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

loadExam();
</script>
